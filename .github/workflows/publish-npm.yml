name: Publish NPM

on:
  workflow_dispatch:

concurrency:
  group: publish-npm
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Verify Tag Ref
        run: |
          if [[ "${GITHUB_REF}" != refs/tags/v* ]]; then
            echo "Publish must be dispatched at a v* tag, received ${GITHUB_REF}" >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Verify Tag Matches Package Version
        run: |
          PACKAGE_VERSION=$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")
          if [ "v${PACKAGE_VERSION}" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json version v${PACKAGE_VERSION}" >&2
            exit 1
          fi

      - name: Verify Tagged Commit Is On Main
        run: |
          git fetch origin main --depth=1
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "FETCH_HEAD"; then
            echo "Tagged commit ${GITHUB_SHA} is not reachable from origin/main" >&2
            exit 1
          fi

  verify:
    needs: preflight
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['22', '24']
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install
        run: npm ci --ignore-scripts --no-fund --no-audit

      - name: Verify
        run: npm run verify

  publish:
    needs: [preflight, verify]
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Install
        run: npm ci --ignore-scripts --no-fund --no-audit

      - name: Check Published Version
        id: published
        run: |
          VIEW_JSON="${RUNNER_TEMP}/npm-view.json"
          VIEW_ERROR="${RUNNER_TEMP}/npm-view.stderr"
          set +e
          PACKAGE_NAME=$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).name")
          PACKAGE_VERSION=$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")
          npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version --json > "${VIEW_JSON}" 2> "${VIEW_ERROR}"
          VIEW_STATUS=$?
          set -e
          if [ "${VIEW_STATUS}" -eq 0 ]; then
            echo "published=true" >> "${GITHUB_OUTPUT}"
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is already published; skipping npm publish."
          elif node -e 'const fs = require("node:fs"); let value; try { value = JSON.parse(fs.readFileSync(process.argv[1], "utf8")); } catch {} process.exit(value?.error?.code === "E404" ? 0 : 1)' "${VIEW_JSON}"; then
            echo "published=false" >> "${GITHUB_OUTPUT}"
          else
            cat "${VIEW_JSON}" >&2
            cat "${VIEW_ERROR}" >&2
            exit "${VIEW_STATUS}"
          fi

      - name: Build And Validate Exact Package
        id: package
        if: steps.published.outputs.published != 'true'
        run: |
          PACKAGE_DIR="${RUNNER_TEMP}/datum-package"
          mkdir -p "${PACKAGE_DIR}"
          DATUM_PACK_DESTINATION="${PACKAGE_DIR}" npm run check:pack
          PACKAGE_PATH="${PACKAGE_DIR}/kontourai-datum-${GITHUB_REF_NAME#v}.tgz"
          test -f "${PACKAGE_PATH}"
          shasum -a 512 "${PACKAGE_PATH}"
          echo "path=${PACKAGE_PATH}" >> "${GITHUB_OUTPUT}"

      - name: Publish
        if: steps.published.outputs.published != 'true'
        run: npm publish "${{ steps.package.outputs.path }}" --access public --provenance --ignore-scripts
